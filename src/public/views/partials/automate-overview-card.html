<!-- src/public/parts/automate-overview-card.html -->
<!-- Skeleton loading -->
<div x-show="loadingAutomates && automates.length === 0" class="grid grid-cols-1 md:grid-cols-2 gap-3">
  <template x-for="i in 4" :key="'skel-'+i">
    <div class="rounded-2xl border border-base-700/40 bg-base-900/45 p-4 animate-pulse">
      <div class="flex items-center gap-2 mb-3">
        <div class="w-8 h-8 rounded-lg bg-base-800"></div>
        <div class="flex-1 space-y-1.5">
          <div class="h-3.5 bg-base-800 rounded w-2/3"></div>
          <div class="h-2.5 bg-base-800/70 rounded w-1/3"></div>
        </div>
      </div>
      <div class="space-y-2">
        <div class="h-3 bg-base-800/70 rounded w-3/4"></div>
        <div class="h-3 bg-base-800/70 rounded w-1/2"></div>
      </div>
    </div>
  </template>
</div>

<!-- Search empty -->
<div x-show="!loadingAutomates && filteredAutomates.length === 0 && searchAutomates.trim()" x-cloak class="flex flex-col items-center justify-center py-16 text-center">
  <div class="w-12 h-12 rounded-xl border border-base-700/40 flex items-center justify-center mb-3">
    <svg class="w-5 h-5 text-base-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </div>
  <p class="text-xs text-base-400 font-mono">No automates match "<span x-text="searchAutomates"></span>"</p>
</div>

<!-- Automate cards (separate per item, like bot cards) -->
<div x-show="!loadingAutomates && filteredAutomates.length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-3">
  <template x-for="(acc, idx) in filteredAutomates" :key="acc.id">
    <div class="text-left rounded-2xl border border-base-700/40 bg-base-900/45 hover:border-base-600/60 hover:bg-base-800/30 transition-all p-4">
      <!-- Header: icon + name + trash button -->
      <div class="flex items-center justify-between gap-2 mb-3">
        <button @click="openDetail(acc.id)" type="button" class="flex items-center gap-2 min-w-0 flex-1 text-left cursor-pointer">
          <svg class="w-4 h-4 text-val-green flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <p class="text-sm font-semibold text-base-100 truncate leading-tight" x-text="acc.name || 'Unnamed'"></p>
        </button>
        <button @click="removeAutomate(idx)" type="button" class="w-7 h-7 rounded-lg flex items-center justify-center text-base-500 hover:text-danger hover:bg-danger/10 transition-all active:scale-90 flex-shrink-0" title="Delete automate">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>

      <!-- Body: id + auto status (clickable to open detail) -->
      <button @click="openDetail(acc.id)" type="button" class="w-full text-left space-y-1.5 mb-3 cursor-pointer">
        <div class="flex items-center gap-2 text-xs">
          <span class="text-[9px] text-base-500 uppercase tracking-widest font-mono w-12 flex-shrink-0">ID</span>
          <p class="font-mono text-base-300 truncate" x-text="acc.id"></p>
        </div>
        <div class="flex items-center gap-2 text-xs">
          <span class="text-[9px] text-base-500 uppercase tracking-widest font-mono w-12 flex-shrink-0">Auto</span>
          <div class="flex items-center gap-1.5">
            <span class="inline-flex items-center text-[9px] font-mono font-bold px-1.5 py-0.5 rounded-full border"
              :class="acc.skillUpRunning ? 'text-val-green bg-val-green/10 border-val-green/30' : 'text-base-500 bg-base-800/40 border-base-700/40'">Skill</span>
            <span class="inline-flex items-center text-[9px] font-mono font-bold px-1.5 py-0.5 rounded-full border"
              :class="acc.autoWarRunning ? 'text-val-blue bg-val-blue/10 border-val-blue/30' : 'text-base-500 bg-base-800/40 border-base-700/40'">Training</span>
            <span class="inline-flex items-center text-[9px] font-mono font-bold px-1.5 py-0.5 rounded-full border"
              :class="acc.autoWorkRunning ? 'text-warn bg-warn/10 border-warn/30' : 'text-base-500 bg-base-800/40 border-base-700/40'">Work</span>
          </div>
        </div>
      </button>
    </div>
  </template>
</div>
