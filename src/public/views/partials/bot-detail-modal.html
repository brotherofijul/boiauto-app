<!-- /views/partials/bot-detail-modal.html -->
<div x-show="selectedBotId" x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     @keydown.escape.window="closeBotDetail()">
  <div class="absolute inset-0 bg-base-950/75 backdrop-blur-md" @click="closeBotDetail()"></div>

  <div class="relative w-full max-w-lg rounded-2xl border border-val-blue/25 bg-base-900/95 shadow-2xl shadow-black/50 overflow-hidden backdrop-blur-xl max-h-[90vh] flex flex-col"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95 translate-y-3"
       x-transition:enter-end="opacity-100 scale-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 scale-100 translate-y-0"
       x-transition:leave-end="opacity-0 scale-95 translate-y-3">
    <div class="h-1 bg-val-blue"></div>

    <template x-if="selectedBot">
      <div class="flex flex-col max-h-[90vh]">
        <!-- Header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-base-800/60 flex-shrink-0">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-10 h-10 rounded-xl bg-val-blue/10 border border-val-blue/20 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-val-blue" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/></svg>
            </div>
            <div class="min-w-0">
              <h3 class="text-base font-bold text-base-100 tracking-tight truncate" x-text="selectedBot.name"></h3>
              <p class="text-[10px] text-base-500 font-mono tracking-wider uppercase" x-text="selectedBot.botId"></p>
            </div>
          </div>
          <button @click="closeBotDetail()" type="button" class="w-8 h-8 rounded-lg flex items-center justify-center text-base-500 hover:text-danger hover:bg-danger/10 transition-all active:scale-90 flex-shrink-0">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- Body -->
        <div class="overflow-y-auto log-scroll px-5 py-5 space-y-4 flex-1">
          <!-- Stats grid -->
          <div class="grid grid-cols-2 gap-2.5">
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Status</p>
              <p class="leading-none">
                <span class="text-sm font-mono font-bold"
                  :class="selectedBot.status === 'connected' ? 'text-val-green' : (selectedBot.status === 'connecting' ? 'text-warn' : 'text-danger')"
                  x-text="botStatusText(selectedBot.status)"></span>
              </p>
            </div>
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Access Tokens</p>
              <p class="text-sm font-bold font-mono text-base-200 leading-none" x-text="accessTokensForBot.length"></p>
            </div>
          </div>

          <!-- Configuration section (direct edit like automate) -->
          <div class="border-t border-base-800/60 pt-4 space-y-3.5">
            <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono font-bold">Configuration</p>

            <!-- Name (direct edit) -->
            <div>
              <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">                Name
              </label>
              <input x-model="selectedBot.name" @input="saveBotDirect()" placeholder="Bot name..." class="w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm px-3 py-2.5 font-mono placeholder:text-base-600 transition-all focus:bg-base-800 focus:border-base-600/50" />
            </div>

            <!-- Bot Token (direct edit with eye toggle) -->
            <div>
              <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">                Bot Token
              </label>
              <div class="relative">
                <input x-model="selectedBot.token" @input="saveBotDirect()" :type="showDetailBotToken ? 'text' : 'password'" placeholder="Bot token..." class="w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm px-3 py-2.5 pr-10 font-mono placeholder:text-base-600 transition-all focus:bg-base-800 focus:border-base-600/50" />
                <button @click="showDetailBotToken=!showDetailBotToken" type="button" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-base-500 hover:text-base-200 transition-colors p-0.5">
                  <svg x-show="!showDetailBotToken" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg x-show="showDetailBotToken" x-cloak class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>

            <!-- Type select (direct edit, plain text) -->
            <div class="relative" x-data="{ open: false, opts: ['Dual','Shared'] }" @click.outside="open=false">
              <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">                Type
              </label>
              <button @click="open=!open" type="button" class="relative w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm pl-3 pr-8 py-2.5 font-mono text-base-100 transition-all cursor-pointer hover:border-base-600/50 text-left">
                <span x-text="selectedBot.type"></span>
                <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500 transition-transform pointer-events-none" :class="open?'rotate-180':''" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div x-show="open" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1" class="absolute z-40 mt-1 left-0 right-0 rounded-lg bg-base-800 border border-base-700/40 shadow-lg shadow-black/40 overflow-hidden">
                <template x-for="o in opts" :key="'botdettype-'+o">
                  <button @click="selectedBot.type=o; open=false; saveBotDirect()" type="button" class="w-full px-3 py-2 text-left text-xs font-mono transition-colors flex items-center justify-between" :class="selectedBot.type===o ? 'bg-base-800/40 text-base-300' : 'text-base-200 hover:bg-base-700/50'">
                    <span x-text="o"></span>
                    <span x-show="selectedBot.type===o" class="w-1.5 h-1.5 rounded-full bg-base-300"></span>
                  </button>
                </template>
              </div>
            </div>
          </div>

          <!-- Access Tokens list -->
          <div class="border-t border-base-800/60 pt-4">
            <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono font-bold mb-3">Access Tokens</p>
            <div class="space-y-2">
              <template x-if="accessTokensForBot.length === 0">
                <div class="text-center py-4 text-base-500 text-xs font-mono">No access tokens for this bot</div>
              </template>
              <template x-for="(a, idx) in accessTokensForBot" :key="'botdet-acc-'+a.id">
                <div class="flex items-center justify-between gap-3 px-3 py-2.5 rounded-lg bg-base-800/40 border border-base-700/30">
                  <div class="flex items-center gap-2.5 min-w-0">
                    <div class="w-7 h-7 rounded-lg bg-warn/10 border border-warn/20 flex items-center justify-center flex-shrink-0">
                      <svg class="w-3.5 h-3.5 text-warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <div class="min-w-0">
                      <p class="text-xs font-semibold text-base-100 truncate" x-text="a.name || a.accessId"></p>
                      <p class="text-[9px] text-base-500 font-mono truncate" x-text="maskToken(a.token)"></p>
                    </div>
                  </div>
                  <div class="flex items-center gap-2 flex-shrink-0">
                    <span class="inline-flex items-center text-[9px] font-mono font-bold px-1.5 py-0.5 rounded-full border"
                      :class="typeClass(a.type)"
                      x-text="a.type"></span>
                    <button @click="removeAccessFromBot(idx)" type="button" class="w-7 h-7 rounded-lg flex items-center justify-center text-base-500 hover:text-danger hover:bg-danger/10 transition-all active:scale-90" title="Delete access">
                      <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                    </button>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Footer: only Remove + Done -->
        <div class="px-5 py-4 border-t border-base-800/60 flex gap-2 flex-shrink-0">
          <button @click="removeSelectedBot()" type="button" class="rounded-lg font-semibold text-xs px-4 py-2.5 border border-danger/30 bg-danger/5 text-danger hover:bg-danger/10 transition-all active:scale-[.97] flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            Remove
          </button>
          <div class="flex-1"></div>
          <button @click="closeBotDetail()" type="button" class="rounded-lg font-semibold text-xs px-5 py-2.5 border border-val-blue/30 bg-val-blue/5 text-val-blue hover:bg-val-blue/10 hover:border-val-blue/50 transition-all active:scale-[.97]">
            Done
          </button>
        </div>
      </div>
    </template>
  </div>
</div>
