<!-- src/public/parts/automate-detail-modal.html -->
<div x-show="selectedAutomateId" x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     @keydown.escape.window="closeDetail()">

  <div class="absolute inset-0 bg-base-950/75 backdrop-blur-md" @click="closeDetail()"></div>

  <div class="relative w-full max-w-lg rounded-2xl border border-val-green/25 bg-base-900/95 shadow-2xl shadow-black/50 overflow-hidden backdrop-blur-xl max-h-[90vh] flex flex-col"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95 translate-y-3"
       x-transition:enter-end="opacity-100 scale-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 scale-100 translate-y-0"
       x-transition:leave-end="opacity-0 scale-95 translate-y-3">
    <div class="h-1 bg-val-green"></div>

    <template x-if="selectedAutomate">
      <div class="flex flex-col max-h-[90vh]">
        <!-- Header: name + id below -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-base-800/60 flex-shrink-0">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-10 h-10 rounded-xl bg-val-green/10 border border-val-green/20 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-val-green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="min-w-0">
              <h3 class="text-base font-bold text-base-100 tracking-tight truncate" x-text="selectedAutomate.name || 'Unnamed Automate'"></h3>
              <p class="text-[10px] text-base-500 font-mono tracking-wider uppercase" x-text="selectedAutomate.id"></p>
            </div>
          </div>
          <button @click="closeDetail()" type="button" class="w-8 h-8 rounded-lg flex items-center justify-center text-base-500 hover:text-danger hover:bg-danger/10 transition-all active:scale-90 flex-shrink-0">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- Body -->
        <div class="overflow-y-auto log-scroll px-5 py-5 space-y-4 flex-1">
          <!-- 4 stat boxes (no icons) -->
          <div class="grid grid-cols-2 gap-2.5">
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Bot ID</p>
              <p class="text-sm font-bold font-mono text-base-200 leading-none truncate" x-text="selectedAutomate.botId || '—'"></p>
            </div>
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Bot Status</p>
              <p class="text-sm font-mono font-bold leading-none"
                :class="selectedAutomate.botStatus === 'connected' ? 'text-val-green' : (selectedAutomate.botStatus === 'connecting' ? 'text-warn' : 'text-danger')"
                x-text="selectedAutomate.botStatus === 'connected' ? 'Connected' : (selectedAutomate.botStatus === 'connecting' ? 'Connecting' : 'Disconnected')"></p>
            </div>
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Cash</p>
              <p class="text-sm font-bold font-mono text-base-200 leading-none" x-text="formatBalance(selectedAutomate.balance)"></p>
            </div>
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Diamond</p>
              <p class="text-sm font-bold font-mono text-base-200 leading-none" x-text="formatNumber(selectedAutomate.diamond)"></p>
            </div>
          </div>

          <!-- Configuration: Bearer Token + Access -->
          <div class="border-t border-base-800/60 pt-4 space-y-3.5">
            <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono font-bold">Configuration</p>

            <div>
              <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider">Bearer Token</label>
              <div class="relative">
                <input x-model="selectedAutomate.bearer" @input="saveAutomate(selectedIndex)" :type="selectedAutomate.showBearer?'text':'password'" :disabled="selectedAutomate.running" placeholder="Bearer token..." class="w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm px-3 py-2.5 pr-10 font-mono placeholder:text-base-600 transition-all focus:bg-base-800 disabled:opacity-60" />
                <button @click="selectedAutomate.showBearer=!selectedAutomate.showBearer" type="button" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-base-500 hover:text-base-200 transition-colors p-0.5">
                  <svg x-show="!selectedAutomate.showBearer" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg x-show="selectedAutomate.showBearer" x-cloak class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>

            <div class="relative" x-data="{ open: false }" @click.outside="open=false">
              <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider">Access</label>
              <button @click="open=!open" :disabled="selectedAutomate.running || accessList.length === 0" type="button" class="relative w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm pl-3 pr-8 py-2.5 font-mono text-base-100 transition-all cursor-pointer hover:border-base-600/50 text-left disabled:cursor-not-allowed disabled:opacity-60">
                <span x-text="accessList.find(a=>a.accessId===selectedAutomate.accessId)?.name || accessList.find(a=>a.accessId===selectedAutomate.accessId)?.accessId || 'Select access...'"></span>
                <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500 transition-transform pointer-events-none" :class="open?'rotate-180':''" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div x-show="open" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1" class="absolute z-40 mt-1 left-0 right-0 rounded-lg bg-base-800 border border-base-700/40 shadow-lg shadow-black/40 overflow-hidden max-h-60 overflow-y-auto log-scroll">
                <template x-for="a in accessList" :key="'detacc-'+a.accessId">
                  <button @click="selectedAutomate.accessId=a.accessId; selectedAutomate.accessName=a.name; selectedAutomate.accessType=a.type; selectedAutomate.botId=a.botId; selectedAutomate.botName=a.botName; selectedAutomate.type=a.type; open=false; saveAutomate(selectedIndex)" type="button" class="w-full px-3 py-2 text-left text-xs font-mono transition-colors flex items-center justify-between gap-2" :class="selectedAutomate.accessId===a.accessId ? 'bg-base-800/40 text-base-300' : 'text-base-200 hover:bg-base-700/50'">
                    <div class="min-w-0">
                      <p class="truncate" x-text="a.name || a.accessId"></p>
                      <p class="text-[9px] text-base-500 truncate" x-text="a.botName + ' · ' + a.accessId"></p>
                    </div>
                    <div class="flex items-center gap-1.5 flex-shrink-0">
                      <span class="text-[9px] font-mono" :class="isAccessFull(a) ? 'text-danger' : 'text-base-300'" x-text="accessUsageText(a)"></span>
                      <span class="text-[9px] px-1.5 py-0.5 rounded-full border" :class="typeClass(a.type)" x-text="a.type"></span>
                    </div>
                  </button>
                </template>
              </div>
            </div>
          </div>

          <!-- Skill section: toggle + select skill + select pay -->
          <div class="border-t border-base-800/60 pt-4 space-y-3">
            <div class="flex items-center justify-between">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono font-bold">Skill</p>
              <button @click="toggleFeature(selectedIndex, 'skillUp')" :disabled="selectedAutomate.running || !selectedAutomate.bearer.trim() || !selectedAutomate.accessId" type="button"
                class="inline-flex items-center gap-1.5 text-[10px] font-mono font-bold px-2.5 py-1 rounded-full border transition-all active:scale-95"
                :class="selectedAutomate.skillUpRunning ? 'text-val-green bg-val-green/10 border-val-green/30' : 'text-base-500 bg-base-800/40 border-base-700/40 hover:border-base-600/50'">
                <span class="w-1.5 h-1.5 rounded-full" :class="selectedAutomate.skillUpRunning ? 'bg-val-green' : 'bg-base-500'"></span>
                <span x-text="selectedAutomate.skillUpRunning ? 'ON' : 'OFF'"></span>
              </button>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="relative" x-data="{ open: false, opts: [{v:1,l:'Barrack'},{v:2,l:'War Tech'},{v:3,l:'Scientist'}] }" @click.outside="open=false">
                <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider">Skill Type</label>
                <button @click="open=!open" :disabled="selectedAutomate.running" type="button" class="relative w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm pl-3 pr-8 py-2.5 font-mono text-base-100 transition-all cursor-pointer hover:border-base-600/50 text-left disabled:cursor-not-allowed disabled:opacity-60">
                  <span x-text="opts.find(o=>o.v===selectedAutomate.skill)?.l"></span>
                  <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500 transition-transform pointer-events-none" :class="open?'rotate-180':''" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div x-show="open" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1" class="absolute z-40 mt-1 left-0 right-0 rounded-lg bg-base-800 border border-base-700/40 shadow-lg shadow-black/40 overflow-hidden">
                  <template x-for="o in opts" :key="selectedAutomate.id+'sk-'+o.v">
                    <button @click="selectedAutomate.skill=o.v; open=false; saveAutomate(selectedIndex)" type="button" class="w-full px-3 py-2 text-left text-xs font-mono transition-colors flex items-center justify-between" :class="selectedAutomate.skill===o.v ? 'bg-base-800/40 text-base-300' : 'text-base-200 hover:bg-base-700/50'">
                      <span x-text="o.l"></span>
                      <span x-show="selectedAutomate.skill===o.v" class="w-1.5 h-1.5 rounded-full bg-base-300"></span>
                    </button>
                  </template>
                </div>
              </div>
              <div class="relative" x-data="{ open: false, opts: [{v:1,l:'Money'},{v:2,l:'Diamond'}] }" @click.outside="open=false">
                <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider">Pay</label>
                <button @click="open=!open" :disabled="selectedAutomate.running" type="button" class="relative w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm pl-3 pr-8 py-2.5 font-mono text-base-100 transition-all cursor-pointer hover:border-base-600/50 text-left disabled:cursor-not-allowed disabled:opacity-60">
                  <span x-text="opts.find(o=>o.v===selectedAutomate.pay)?.l"></span>
                  <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500 transition-transform pointer-events-none" :class="open?'rotate-180':''" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div x-show="open" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1" class="absolute z-40 mt-1 left-0 right-0 rounded-lg bg-base-800 border border-base-700/40 shadow-lg shadow-black/40 overflow-hidden">
                  <template x-for="o in opts" :key="selectedAutomate.id+'pay-'+o.v">
                    <button @click="selectedAutomate.pay=o.v; open=false; saveAutomate(selectedIndex)" type="button" class="w-full px-3 py-2 text-left text-xs font-mono transition-colors flex items-center justify-between" :class="selectedAutomate.pay===o.v ? 'bg-base-800/40 text-base-300' : 'text-base-200 hover:bg-base-700/50'">
                      <span x-text="o.l"></span>
                      <span x-show="selectedAutomate.pay===o.v" class="w-1.5 h-1.5 rounded-full bg-base-300"></span>
                    </button>
                  </template>
                </div>
              </div>
            </div>
          </div>

          <!-- Progress (no separator) -->
          <div class="space-y-2">
            <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono font-bold">Progress</p>
            <div class="grid grid-cols-2 gap-2">
              <div class="rounded-lg bg-base-800/50 border border-base-700/30 p-2.5 text-center">
                <p class="text-[9px] text-base-500 uppercase tracking-widest mb-1 font-mono">Current</p>
                <p class="text-2xl font-bold font-mono text-base-100 leading-none" x-text="selectedAutomate.currentLevel??'—'">—</p>
              </div>
              <div class="rounded-lg bg-base-800/50 border border-base-700/30 p-2.5 text-center">
                <p class="text-[9px] text-base-500 uppercase tracking-widest mb-1 font-mono">Next</p>
                <p class="text-2xl font-bold font-mono text-base-300 leading-none" x-text="selectedAutomate.targetLevel??'—'">—</p>
              </div>
            </div>
            <div class="rounded-lg bg-base-800/50 border border-base-700/30 px-3 py-2 text-center">
              <p class="text-[9px] text-base-500 uppercase tracking-widest mb-0.5 font-mono">Time Remaining</p>
              <p class="text-lg font-bold font-mono leading-none"
                :class="timeClass(selectedIndex)"
                :style="timeLow(selectedIndex)?'animation:count-pulse 1s ease-in-out infinite':''"
                x-text="selectedAutomate.time">—</p>
            </div>
          </div>

          <!-- Training: on/off -->
          <div class="border-t border-base-800/60 pt-4">
            <div class="flex items-center justify-between">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono font-bold">Training</p>
              <button @click="toggleFeature(selectedIndex, 'autoWar')" :disabled="selectedAutomate.running || !selectedAutomate.bearer.trim() || !selectedAutomate.accessId" type="button"
                class="inline-flex items-center gap-1.5 text-[10px] font-mono font-bold px-2.5 py-1 rounded-full border transition-all active:scale-95"
                :class="selectedAutomate.autoWarRunning ? 'text-val-blue bg-val-blue/10 border-val-blue/30' : 'text-base-500 bg-base-800/40 border-base-700/40 hover:border-base-600/50'">
                <span class="w-1.5 h-1.5 rounded-full" :class="selectedAutomate.autoWarRunning ? 'bg-val-blue' : 'bg-base-500'"></span>
                <span x-text="selectedAutomate.autoWarRunning ? 'ON' : 'OFF'"></span>
              </button>
            </div>
          </div>

          <!-- Work: on/off -->
          <div class="border-t border-base-800/60 pt-4">
            <div class="flex items-center justify-between">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono font-bold">Work</p>
              <button @click="toggleFeature(selectedIndex, 'autoWork')" :disabled="selectedAutomate.running || !selectedAutomate.bearer.trim() || !selectedAutomate.accessId" type="button"
                class="inline-flex items-center gap-1.5 text-[10px] font-mono font-bold px-2.5 py-1 rounded-full border transition-all active:scale-95"
                :class="selectedAutomate.autoWorkRunning ? 'text-warn bg-warn/10 border-warn/30' : 'text-base-500 bg-base-800/40 border-base-700/40 hover:border-base-600/50'">
                <span class="w-1.5 h-1.5 rounded-full" :class="selectedAutomate.autoWorkRunning ? 'bg-warn' : 'bg-base-500'"></span>
                <span x-text="selectedAutomate.autoWorkRunning ? 'ON' : 'OFF'"></span>
              </button>
            </div>
          </div>

          <div x-show="selectedAutomate.error" x-transition.opacity.duration.200ms class="rounded-lg bg-danger/10 border border-danger/20 px-3 py-2 text-[11px] text-danger font-mono leading-snug flex items-center gap-2">
            <svg class="w-3.5 h-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span x-text="selectedAutomate.error"></span>
          </div>
        </div>

        <!-- Footer: Remove + Done -->
        <div class="px-5 py-4 border-t border-base-800/60 flex gap-2 flex-shrink-0">
          <button @click="removeAutomate(selectedIndex)" type="button" class="rounded-lg font-semibold text-xs px-4 py-2.5 border border-danger/30 bg-danger/5 text-danger hover:bg-danger/10 transition-all active:scale-[.97] flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            Remove
          </button>
          <div class="flex-1"></div>
          <button @click="closeDetail()" type="button" class="rounded-lg font-semibold text-xs px-5 py-2.5 border border-val-green/30 bg-val-green/5 text-val-green hover:bg-val-green/10 hover:border-val-green/50 transition-all active:scale-[.97]">
            Done
          </button>
        </div>
      </div>
    </template>
  </div>
</div>
