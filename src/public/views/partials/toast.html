<!-- src/public/parts/toast.html -->
<div class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
  <template x-for="t in toasts" :key="t.id">
    <div
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 translate-x-4"
      x-transition:enter-end="opacity-100 translate-x-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 translate-x-0"
      x-transition:leave-end="opacity-0 translate-x-4"
      class="pointer-events-auto rounded-xl border shadow-lg backdrop-blur-md px-4 py-3 flex items-start gap-2.5 min-w-[280px] max-w-sm"
      :class="{
        'bg-val-green/10 border-val-green/30 text-val-green': t.type === 'success',
        'bg-danger/10 border-danger/30 text-danger': t.type === 'error',
        'bg-val-blue/10 border-val-blue/30 text-val-blue': t.type === 'info',
      }">
      <div class="flex-shrink-0 mt-0.5">
        <svg x-show="t.type === 'success'" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <svg x-show="t.type === 'error'" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <svg x-show="t.type === 'info'" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </div>
      <p class="text-xs font-mono leading-relaxed flex-1" x-text="t.message"></p>
      <button @click="dismissToast(t.id)" type="button" class="flex-shrink-0 opacity-60 hover:opacity-100 transition-opacity">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </template>
</div>
