<!-- /views/partials/access-topbar.html -->
<div class="flex items-center justify-between mb-4 gap-3" x-show="accessList.length > 0">
  <div class="flex items-center gap-3 min-w-0">
    <div class="w-1 h-8 rounded-full bg-warn flex-shrink-0"></div>
    <div class="min-w-0">
      <h2 class="text-sm font-bold tracking-tight text-base-100 uppercase font-mono leading-tight">Access</h2>
      <p class="text-[10px] text-base-500 font-mono tracking-wider mt-0.5" x-text="accessList.length + ' token' + (accessList.length===1?'':'s')"></p>
    </div>
  </div>
  <div class="flex items-center gap-2 flex-shrink-0">
    <div class="relative">
      <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input x-model="searchAccess" type="text" placeholder="Search..." class="w-28 sm:w-36 rounded-lg bg-base-800/70 border border-base-700/70 text-xs pl-8 pr-3 py-2 font-mono placeholder:text-base-600 transition-all focus:bg-base-800 focus:border-base-600/50 focus:w-36 sm:focus:w-44" />
    </div>
    <button @click="openAddAccessModal()" type="button"
  class="rounded-xl border border-base-700/70 bg-base-800/50 text-base-200 hover:bg-base-700/40 hover:border-base-600/60 font-bold text-xs px-3 py-2 flex items-center gap-1.5 transition-all active:scale-[.96] flex-shrink-0">
  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  <span class="font-mono tracking-wider uppercase">Add</span>
</button>
  </div>
</div>
