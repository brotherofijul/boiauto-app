<!-- src/public/parts/bot-list.html -->
<!-- Empty state -->
<div x-show="!loadingBots && bots.length === 0 && !searchBots.trim()" x-cloak x-transition.opacity.duration.300ms class="flex flex-col items-center justify-center py-24 text-center">
  <div class="relative mb-6">
    <div class="absolute inset-0 rounded-3xl bg-val-blue/10 blur-2xl"></div>
    <div class="relative w-20 h-20 rounded-3xl border-2 border-dashed border-base-700 flex items-center justify-center bg-base-900/50">
      <svg class="w-9 h-9 text-base-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <circle cx="12" cy="5" r="2"/>
        <path d="M12 7v4"/>
        <line x1="8" y1="16" x2="8" y2="16"/>
        <line x1="16" y1="16" x2="16" y2="16"/>
      </svg>
    </div>
  </div>
  <p class="text-base text-base-200 font-semibold mb-1.5">No bots yet</p>
  <p class="text-xs text-base-500 font-mono mb-6 max-w-xs leading-relaxed">Add your first bot to start managing bot sessions and link them to automates.</p>
  <button @click="openAddBotModal()" type="button" class="rounded-xl border border-val-blue/30 bg-val-blue/5 text-val-blue hover:bg-val-blue/10 hover:border-val-blue/50 font-bold text-xs px-5 py-3 flex items-center gap-2 transition-all active:scale-[.96]">
    <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span class="tracking-wider uppercase">Add Bot</span>
  </button>
</div>

<!-- Skeleton loading -->
<div x-show="loadingBots && bots.length === 0" class="grid grid-cols-1 md:grid-cols-2 gap-3">
  <template x-for="i in 4" :key="'skel-bot-'+i">
    <div class="rounded-2xl border border-base-800/50 bg-base-900/45 p-4 animate-pulse">
      <div class="flex items-center gap-2 mb-3">
        <div class="w-8 h-8 rounded-lg bg-base-800"></div>
        <div class="flex-1 space-y-1.5">
          <div class="h-3.5 bg-base-800 rounded w-2/3"></div>
          <div class="h-2.5 bg-base-800/70 rounded w-1/3"></div>
        </div>
      </div>
      <div class="space-y-2">
        <div class="h-3 bg-base-800/70 rounded w-3/4"></div>
        <div class="h-3 bg-base-800/70 rounded w-1/2"></div>
      </div>
    </div>
  </template>
</div>

<!-- Search empty -->
<div x-show="!loadingBots && filteredBots.length === 0 && searchBots.trim()" x-cloak class="flex flex-col items-center justify-center py-16 text-center">
  <div class="w-12 h-12 rounded-xl border border-base-700/40 flex items-center justify-center mb-3">
    <svg class="w-5 h-5 text-base-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </div>
  <p class="text-xs text-base-400 font-mono">No bots match "<span x-text="searchBots"></span>"</p>
</div>

<!-- Bot cards (separate per item) -->
<div x-show="!loadingBots && filteredBots.length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-3">
  <template x-for="(b, idx) in filteredBots" :key="b.id">
    <button @click="openBotDetail(b.id)" type="button" class="text-left rounded-2xl border border-base-700/40 bg-base-900/45 hover:border-base-600/60 hover:bg-base-800/30 transition-all p-4 cursor-pointer">
      <!-- Header: icon + name + status top-right -->
      <div class="flex items-center justify-between gap-2 mb-3">
        <div class="flex items-center gap-2 min-w-0 flex-1">
          <svg class="w-4 h-4 text-val-blue flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
          <p class="text-sm font-semibold text-base-100 truncate leading-tight" x-text="b.name"></p>
        </div>
        <span class="inline-flex items-center gap-1.5 text-[10px] font-mono px-2 py-0.5 rounded-full border flex-shrink-0"
          :class="botStatusClass(b.status)">
          <template x-if="isConnecting(b.status)">
            <svg class="w-3 h-3 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </template>
          <template x-if="!isConnecting(b.status)">
            <span class="relative flex w-1.5 h-1.5">
              <template x-if="isConnected(b.status)">
                <span class="absolute inline-flex w-full h-full rounded-full bg-val-green opacity-75 animate-ping"></span>
              </template>
              <span class="relative inline-flex w-1.5 h-1.5 rounded-full" :class="botStatusDotClass(b.status)"></span>
            </span>
          </template>
          <span x-text="botStatusText(b.status)"></span>
        </span>
      </div>

      <!-- Body: bot id + type -->
      <div class="space-y-1.5 mb-3">
        <div class="flex items-center gap-2 text-xs">
          <span class="text-[9px] text-base-500 uppercase tracking-widest font-mono w-12 flex-shrink-0">ID</span>
          <p class="font-mono text-base-300 truncate" x-text="b.botId"></p>
        </div>
        <div class="flex items-center gap-2 text-xs">
          <span class="text-[9px] text-base-500 uppercase tracking-widest font-mono w-12 flex-shrink-0">Type</span>
          <span class="font-mono font-bold"
            :class="b.type === 'Dual' ? 'text-val-green' : 'text-val-blue'"
            x-text="b.type"></span>
          <span x-show="b.type === 'Dual'" x-cloak class="text-[10px] font-mono text-base-500" x-text="'max 2 access'"></span>
        </div>
      </div>

      <!-- Token (click stops propagation) -->
      <div class="flex items-center gap-1 border-t border-base-800/40 pt-2.5" @click.stop>
        <code class="text-xs font-mono text-base-400 truncate flex-1" x-text="b.showToken ? b.token : maskToken(b.token)"></code>
        <button @click.stop="b.showToken=!b.showToken" type="button" class="text-base-500 hover:text-base-200 transition-colors p-1 flex-shrink-0">
          <svg x-show="!b.showToken" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg x-show="b.showToken" x-cloak class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
        <button @click.stop="copyToClipboard(b.token, 'Bot token copied')" type="button" class="text-base-500 hover:text-base-300 transition-colors p-1 flex-shrink-0" title="Copy token">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </button>
  </template>
</div>
