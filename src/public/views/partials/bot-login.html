<!-- /views/partials/bot-login.html -->
<!-- Login with existing bot token (like register/login mechanism) -->
<div class="rounded-2xl border border-val-blue/20 bg-base-900/45 p-4 mb-4">
  <div class="flex items-center gap-2 mb-3">
    <svg class="w-4 h-4 text-val-blue flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    <div>
      <p class="text-sm font-bold text-base-100 leading-tight">Have a bot token?</p>
      <p class="text-[10px] text-base-500 font-mono tracking-wider leading-tight mt-0.5">Login with an existing bot token</p>
    </div>
  </div>
  <div class="flex items-stretch gap-2">
    <div class="relative flex-1">
      <input x-model="loginBotToken" @keydown.enter="loginWithBotToken()" :type="showLoginBotToken ? 'text' : 'password'" placeholder="Paste bot token (bot_...)..." class="w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm px-3 py-2.5 pr-10 font-mono placeholder:text-base-600 transition-all focus:bg-base-800 focus:border-base-600/50" />
      <button @click="showLoginBotToken=!showLoginBotToken" type="button" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-base-500 hover:text-base-200 transition-colors p-0.5">
        <svg x-show="!showLoginBotToken" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg x-show="showLoginBotToken" x-cloak class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <button @click="loginWithBotToken()" :disabled="loggingInBot || !loginBotToken.trim()" type="button"
      class="rounded-lg font-semibold text-xs px-4 py-2.5 flex items-center gap-1.5 transition-all active:scale-[.97] flex-shrink-0"
      :class="loggingInBot || !loginBotToken.trim() ? 'border border-base-700/40 bg-base-800/40 text-base-500 cursor-not-allowed' : 'border border-val-blue/30 bg-val-blue/5 text-val-blue hover:bg-val-blue/10 hover:border-val-blue/50'">
      <template x-if="!loggingInBot">
        <span class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Login
        </span>
      </template>
      <template x-if="loggingInBot">
        <span class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          Verifying...
        </span>
      </template>
    </button>
  </div>
  <div x-show="loginBotError" x-transition.opacity.duration.200ms class="mt-2 rounded-lg bg-danger/10 border border-danger/20 px-3 py-1.5 text-[11px] text-danger font-mono leading-snug flex items-center gap-2">
    <svg class="w-3.5 h-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span x-text="loginBotError"></span>
  </div>
</div>
