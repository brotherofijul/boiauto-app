<!-- /views/partials/access-detail-modal.html -->
<div x-show="selectedAccessId" x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     @keydown.escape.window="closeAccessDetail()">
  <div class="absolute inset-0 bg-base-950/75 backdrop-blur-md" @click="closeAccessDetail()"></div>

  <div class="relative w-full max-w-lg rounded-2xl border border-warn/25 bg-base-900/95 shadow-2xl shadow-black/50 overflow-hidden backdrop-blur-xl max-h-[90vh] flex flex-col"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95 translate-y-3"
       x-transition:enter-end="opacity-100 scale-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 scale-100 translate-y-0"
       x-transition:leave-end="opacity-0 scale-95 translate-y-3">
    <div class="h-1 bg-warn"></div>

    <template x-if="selectedAccess">
      <div class="flex flex-col max-h-[90vh]">
        <!-- Header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-base-800/60 flex-shrink-0">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-10 h-10 rounded-xl bg-warn/10 border border-warn/20 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <div class="min-w-0">
              <h3 class="text-base font-bold text-base-100 tracking-tight truncate" x-text="selectedAccess.name || selectedAccess.accessId"></h3>
              <p class="text-[10px] text-base-500 font-mono tracking-wider uppercase" x-text="selectedAccess.accessId"></p>
            </div>
          </div>
          <button @click="closeAccessDetail()" type="button" class="w-8 h-8 rounded-lg flex items-center justify-center text-base-500 hover:text-danger hover:bg-danger/10 transition-all active:scale-90 flex-shrink-0">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- Body -->
        <div class="overflow-y-auto log-scroll px-5 py-5 space-y-4 flex-1">
          <!-- Stats grid -->
          <div class="grid grid-cols-2 gap-2.5">
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Type</p>
              <span class="inline-flex items-center text-xs font-mono font-bold px-2 py-0.5 rounded-full border"
                :class="selectedAccess.type === 'Private' ? 'text-val-green border-val-green/30'
                  : selectedAccess.type === 'Shared' ? 'text-val-blue border-val-blue/30'
                  : 'text-warn border-warn/30'"
                x-text="selectedAccess.type"></span>
            </div>
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Usage</p>
              <p class="text-sm font-bold font-mono leading-none"
                :class="selectedAccess.type === 'Shared' ? 'text-base-200' : (selectedAccess.usageCount >= 1 ? 'text-danger' : 'text-val-green')"
                x-text="selectedAccess.type === 'Shared' ? selectedAccess.usageCount + ' automates' : (selectedAccess.usageCount + '/1')"></p>
            </div>
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Bot</p>
              <p class="text-sm font-bold font-mono text-base-200 leading-none truncate" x-text="selectedAccess.botName || selectedAccess.botId"></p>
            </div>
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3" x-show="selectedAccess.type === 'Business' && selectedAccess.pricePerDay" x-cloak>
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Price/Day</p>
              <p class="text-sm font-bold font-mono text-val-green leading-none" x-text="formatRateNoSymbol(selectedAccess.pricePerDay)"></p>
            </div>
          </div>

          <!-- Token (with eye toggle, neutral colors) -->
          <div>
            <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">              Access Token
            </label>
            <div class="flex items-stretch gap-2">
              <input :type="showDetailAccessToken ? 'text' : 'password'" :value="selectedAccess.token" readonly class="flex-1 rounded-lg bg-base-800/70 border border-base-700/70 text-xs px-3 py-2.5 font-mono text-base-300 focus:outline-none" />
              <button @click="showDetailAccessToken=!showDetailAccessToken" type="button" class="px-3 rounded-lg border border-base-700/40 bg-base-800/40 text-base-400 hover:text-base-200 transition-all active:scale-90 flex items-center justify-center">
                <svg x-show="!showDetailAccessToken" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg x-show="showDetailAccessToken" x-cloak class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
              <button @click="copyToClipboard(selectedAccess.token, 'Access token copied')" type="button"
                class="px-3 rounded-lg border border-base-700/40 bg-base-800/40 text-base-400 hover:text-base-200 transition-all active:scale-90 flex items-center justify-center">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
            </div>
          </div>

          <!-- Automates using this access -->
          <div class="border-t border-base-800/60 pt-4">
            <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono font-bold mb-3">Automates Using This Access</p>
            <div class="space-y-2">
              <template x-if="automatesUsingAccess.length === 0">
                <div class="text-center py-6 text-base-500 text-xs font-mono">No automates using this access token</div>
              </template>
              <template x-for="(a, idx) in automatesUsingAccess" :key="'accdet-'+a.id">
                <div class="flex items-center justify-between gap-3 px-3 py-2.5 rounded-lg bg-base-800/40 border border-base-700/30">
                  <div class="flex items-center gap-2.5 min-w-0">
                    <div class="w-7 h-7 rounded-lg bg-val-green/10 border border-val-green/20 flex items-center justify-center flex-shrink-0">
                      <svg class="w-3.5 h-3.5 text-val-green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div class="min-w-0">
                      <p class="text-xs font-semibold text-base-100 truncate" x-text="a.name"></p>
                      <p class="text-[9px] text-base-500 font-mono truncate" x-text="'Balance: ' + formatBalance(a.balance)"></p>
                    </div>
                  </div>
                  <div class="flex items-center gap-2 flex-shrink-0">
                    <span class="inline-flex items-center gap-1 text-[10px] font-mono px-2 py-0.5 rounded-full border"
                      :class="(a.skillUpRunning + a.autoWarRunning + a.autoWorkRunning) > 0 ? 'text-val-green bg-val-green/10 border-val-green/30' : 'text-base-500 bg-base-800/40 border-base-700/40'">
                      <span class="w-1.5 h-1.5 rounded-full" :class="(a.skillUpRunning + a.autoWarRunning + a.autoWorkRunning) > 0 ? 'bg-val-green' : 'bg-base-500'"></span>
                      <span x-text="(a.skillUpRunning + a.autoWarRunning + a.autoWorkRunning) > 0 ? 'Running' : 'Idle'"></span>
                    </span>
                    <button @click="removeAutomateFromAccess(idx)" type="button" class="w-7 h-7 rounded-lg flex items-center justify-center text-base-500 hover:text-danger hover:bg-danger/10 transition-all active:scale-90" title="Delete automate">
                      <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                    </button>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Footer: Remove + Done -->
        <div class="px-5 py-4 border-t border-base-800/60 flex gap-2 flex-shrink-0">
          <button @click="removeSelectedAccess()" type="button" class="rounded-lg font-semibold text-xs px-4 py-2.5 border border-danger/30 bg-danger/5 text-danger hover:bg-danger/10 transition-all active:scale-[.97] flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            Remove
          </button>
          <div class="flex-1"></div>
          <button @click="closeAccessDetail()" type="button" class="rounded-lg font-semibold text-xs px-5 py-2.5 border border-warn/30 bg-warn/5 text-warn hover:bg-warn/10 hover:border-warn/50 transition-all active:scale-[.97]">
            Done
          </button>
        </div>
      </div>
    </template>
  </div>
</div>
