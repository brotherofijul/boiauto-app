<!-- src/public/parts/feature-toggle.html -->
<div class="space-y-1.5">
  <template x-for="ft in featureToggles" :key="ft.key">
    <button @click.stop="toggleFeature(idx, ft.feature)" type="button"
      class="w-full flex items-center justify-between gap-2 rounded-lg px-2.5 py-1.5 border transition-all active:scale-[.97]"
      :class="acc[ft.key]
        ? 'border-base-600/50 bg-base-800/40 text-base-200'
        : 'border-base-700/50 bg-base-800/40 text-base-400 hover:border-base-600/50'">
      <div class="flex items-center gap-1.5 min-w-0">
        <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
          :class="'bg-base-300'"></span>
        <span class="text-[11px] font-mono uppercase tracking-wider truncate" x-text="ft.label"></span>
      </div>
      <div class="flex items-center gap-1.5 flex-shrink-0">
        <span class="text-[10px] font-mono font-bold" x-text="acc[ft.key] ? 'ON' : 'OFF'"></span>
        <span class="relative flex w-2 h-2">
          <template x-if="acc[ft.key]">
            <span class="absolute inline-flex w-full h-full rounded-full opacity-75 animate-ping"
              :class="'bg-base-300'"></span>
          </template>
          <span class="relative inline-flex w-2 h-2 rounded-full transition-colors"
            :class="acc[ft.key]
              ? ('bg-base-300')
              : 'bg-base-600'"></span>
        </span>
      </div>
    </button>
  </template>
</div>
