<!-- /index.html -->
<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOIAuto</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-display: "Outfit", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --color-base-950: #0a0e0d;
        --color-base-900: #111916;
        --color-base-800: #1a2420;
        --color-base-700: #243430;
        --color-base-600: #2e443d;
        --color-base-400: #5a7a6e;
        --color-base-200: #a3c4b5;
        --color-base-100: #d0e8dc;
        --color-s1: #00e88f;
        --color-s1-dim: #00c278;
        --color-danger: #ff4d6a;
      }
    </style>
    <link rel="stylesheet" href="style.css" />
    <script defer src="icons.js"></script>
    <script defer src="script.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="min-h-screen text-base-100 bg-grid bg-glow overflow-x-hidden">
    <div id="particles" class="fixed inset-0 pointer-events-none z-0" aria-hidden="true"></div>

    <div x-data="boiauto()" x-init="init()" class="relative z-10 min-h-screen flex flex-col">
      <div x-init="fetch('parts/stack-toggle.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>

      <div x-init="fetch('parts/header.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>

      <div class="flex-1" x-init="fetch('parts/upgrade-skill.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>

      <div x-init="fetch('parts/footer.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>

      <div x-init="fetch('parts/toast.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
      <div x-init="fetch('parts/confirm-modal.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
    </div>
  </body>
</html>
