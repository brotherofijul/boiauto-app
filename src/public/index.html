<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOIAuto</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-display: "Space Grotesk", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --color-base-950: #0a0e0d;
        --color-base-900: #111916;
        --color-base-800: #1a2420;
        --color-base-700: #243430;
        --color-base-600: #2e443d;
        --color-base-400: #5a7a6e;
        --color-base-200: #a3c4b5;
        --color-base-100: #d0e8dc;
        --color-s1: #00e88f;
        --color-s1-dim: #00c278;
        --color-s2: #00c8ff;
        --color-s2-dim: #00a8d6;
        --color-warn: #f5a623;
        --color-danger: #ff4d6a;
      }
    </style>
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="min-h-screen text-base-100 bg-grid bg-glow overflow-x-hidden">
    <div id="particles" class="fixed inset-0 pointer-events-none z-0" aria-hidden="true"></div>

    <div x-data="boiauto()" x-init="init()" class="relative z-10 min-h-screen flex flex-col">
      <!-- HEADER -->
      <header class="border-b border-base-800/50 backdrop-blur-sm bg-base-950/70 sticky top-0 z-30">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
          <div class="flex items-center gap-2.5 flex-shrink-0">
            <div class="w-9 h-9 rounded-lg bg-s1/10 border border-s1/20 flex items-center justify-center">
              <svg class="w-4 h-4 text-s1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
              </svg>
            </div>
            <div>
              <h1 class="text-base font-bold tracking-tight text-shimmer leading-tight">BOIAuto</h1>
              <p class="text-[10px] text-base-400 font-mono tracking-wider uppercase leading-tight">v1.0.0</p>
            </div>
          </div>
        </div>
      </header>

      <!-- MAIN -->
      <main class="flex-1 max-w-3xl mx-auto w-full px-4 sm:px-6 py-5 sm:py-7">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <!-- SLOT CARD (template per slot) -->
          <template x-for="n in [1,2]" :key="'slot-'+n">
            <section>
              <div class="rounded-2xl border overflow-hidden transition-all duration-500"
                :class="slots[n].running
                   ? 'border-s1/30 glow-s1 bg-base-900/80'
                   : 'border-base-800/50 bg-base-900/45'">
                <div class="h-1 flex-shrink-0" :class="slots[n].running?'bg-s1/60':'bg-base-700/40'"></div>

                <div class="p-4 sm:p-5 space-y-3">
                  <!-- Header -->
                  <div class="flex items-center justify-between flex-shrink-0">
                    <span class="text-xs font-mono font-bold px-2 py-0.5 rounded text-s1 bg-s1/10" x-text="'SLOT '+n"></span>
                    <span class="text-[11px] font-mono" :class="slots[n].running?'text-s1':'text-base-600'" x-text="slots[n].running?'ACTIVE':'IDLE'"></span>
                  </div>

                  <!-- Token -->
                  <div class="flex-shrink-0">
                    <label class="block text-[11px] text-base-400 mb-1">Authorization Token</label>
                    <div class="relative">
                      <input x-model="slots[n].token" @input="saveToken(n)" :type="slots[n].showTk?'text':'password'" :disabled="slots[n].running" placeholder="Bearer token..." class="w-full rounded-lg bg-base-800 border border-base-700 text-sm px-3 py-2 pr-9 font-mono placeholder:text-base-600 transition-colors" />
                      <button @click="slots[n].showTk=!slots[n].showTk" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 text-base-500 hover:text-base-200 transition-colors p-0.5">
                        <svg x-show="!slots[n].showTk" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></svg>
                        <svg x-show="slots[n].showTk" x-cloak class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" /><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" /><line x1="1" y1="1" x2="23" y2="23" /></svg>
                      </button>
                    </div>
                  </div>

                  <!-- Skill + Pay side by side -->
                  <div class="grid grid-cols-2 gap-3 flex-shrink-0">
                    <!-- Skill -->
                    <div>
                      <label class="block text-[11px] text-base-400 mb-1">Skill</label>
                      <div class="relative">
                        <select x-model.number="slots[n].skill" :disabled="slots[n].running" class="slot-select w-full rounded-lg bg-base-800 border border-base-700/80 text-sm pl-3 pr-8 py-2 font-mono text-base-100 transition-all cursor-pointer hover:border-s1/30 focus:border-s1/50 focus:ring-1 focus:ring-s1/20">
                          <option value="1">Barrack</option>
                          <option value="2">War Tech</option>
                          <option value="3">Scientist</option>
                        </select>
                        <svg class="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                      </div>
                    </div>
                    <!-- Pay -->
                    <div>
                      <label class="block text-[11px] text-base-400 mb-1">Pay</label>
                      <div class="relative">
                        <select x-model.number="slots[n].pay" :disabled="slots[n].running" class="slot-select w-full rounded-lg bg-base-800 border border-base-700/80 text-sm pl-3 pr-8 py-2 font-mono text-base-100 transition-all cursor-pointer hover:border-s1/30 focus:border-s1/50 focus:ring-1 focus:ring-s1/20">
                          <option value="1">Money</option>
                          <option value="2">Diamond</option>
                        </select>
                        <svg class="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                      </div>
                    </div>
                  </div>

                  <!-- Action Buttons -->
                  <div class="flex gap-2 flex-shrink-0">
                    <button @click="startSlot(n)" :disabled="slots[n].running||!slots[n].token.trim()" type="button" class="flex-1 rounded-lg font-semibold text-xs py-2.5 flex items-center justify-center gap-1.5 transition-all" :class="slots[n].running||!slots[n].token.trim() ? 'bg-base-700 text-base-500' : 'bg-s1 text-base-950 hover:bg-s1-dim active:scale-[.97]'">
                      <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21" /></svg>
                      Start
                    </button>
                    <button @click="stopSlot(n)" :disabled="!slots[n].running" type="button" class="flex-1 rounded-lg font-semibold text-xs py-2.5 flex items-center justify-center gap-1.5 border transition-all" :class="!slots[n].running ? 'border-base-700 bg-base-800 text-base-600' : 'border-danger/40 bg-danger/10 text-danger hover:bg-danger/15 active:scale-[.97]'">
                      <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1.5" /></svg>
                      Stop
                    </button>
                  </div>

                  <!-- Error inline -->
                  <div x-show="slots[n].error" x-transition.opacity.duration.200ms class="rounded-lg bg-danger/10 border border-danger/20 px-3 py-2 text-[11px] text-danger font-mono leading-snug flex-shrink-0" x-text="slots[n].error"></div>

                  <!-- Stats -->
                  <div class="flex-shrink-0 pt-1 space-y-2">
                    <div class="grid grid-cols-2 gap-2">
                      <div class="rounded-lg bg-base-800/50 border border-base-700/30 p-2.5 text-center">
                        <p class="text-[9px] text-base-500 uppercase tracking-widest mb-1">Current</p>
                        <p class="text-2xl font-bold font-mono text-base-100" x-text="slots[n].currentLevel??'—'">—</p>
                      </div>
                      <div class="rounded-lg bg-base-800/50 border border-base-700/30 p-2.5 text-center">
                        <p class="text-[9px] text-base-500 uppercase tracking-widest mb-1">Next</p>
                        <p class="text-2xl font-bold font-mono text-s1" x-text="slots[n].targetLevel??'—'">—</p>
                      </div>
                    </div>
                    <div class="rounded-lg bg-base-800/50 border border-base-700/30 px-3 py-2 text-center">
                      <p class="text-[9px] text-base-500 uppercase tracking-widest mb-0.5">Time</p>
                      <p class="text-lg font-bold font-mono leading-none" :class="timeClass(n)" :style="timeLow(n)?'animation:count-pulse 1s ease-in-out infinite':''" x-text="slots[n].time">—</p>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </template>
        </div>
      </main>

      <!-- FOOTER -->
      <footer class="border-t border-base-800/30 py-3 mt-auto">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 flex items-center justify-between text-[10px] text-base-600 font-mono">
          <span>BOIAuto v1.0.0</span>
          <span>Realtime</span>
        </div>
      </footer>
    </div>
  </body>
</html>
