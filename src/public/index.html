<!-- src/public/index.html -->
<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOIAuto</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-display: "Outfit", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --color-base-950: #09090b;
        --color-base-900: #111113;
        --color-base-800: #1a1a1e;
        --color-base-700: #26262c;
        --color-base-600: #333340;
        --color-base-500: #505060;
        --color-base-400: #7a7a8e;
        --color-base-300: #a0a0b2;
        --color-base-200: #c8c8d4;
        --color-base-100: #e8e8f0;
        --color-val-green: #34d399;
        --color-val-blue: #60a5fa;
        --color-warn: #f5a623;
        --color-danger: #f87171;
      }
    </style>
    <link rel="stylesheet" href="style.css" />
    <script defer src="icons.js"></script>
    <script defer src="state.js"></script>
    <script defer src="helpers.js"></script>
    <script defer src="api.js"></script>
    <script defer src="automate.js"></script>
    <script defer src="bot.js"></script>
    <script defer src="access.js"></script>
    <script defer src="script.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="min-h-screen text-base-100 bg-grid overflow-x-hidden">
    <div class="scan-container"><div class="scanner"></div></div>

    <div x-data="boiauto()" x-init="init()" class="relative z-10 min-h-screen flex flex-col">
      <div x-init="fetch('views/partials/stack-toggle.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>

      <div x-init="fetch('views/partials/navbar.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>

      <div class="flex-1 flex flex-col md:pl-[260px]">
        <div x-init="fetch('views/partials/header.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>

        <div class="flex-1" x-init="fetch('views/partials/upgrade-skill.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>

        <div x-init="fetch('views/partials/footer.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
      </div>

      <div x-init="fetch('views/partials/toast.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
      <div x-init="fetch('views/partials/confirm-modal.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
    </div>
  </body>
</html>
