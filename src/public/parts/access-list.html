<!-- /parts/access-list.html -->
<div x-show="accessList.length === 0" x-cloak x-transition.opacity.duration.300ms class="flex flex-col items-center justify-center py-24 text-center">
  <div class="relative mb-6">
    <div class="absolute inset-0 rounded-3xl bg-warn/10 blur-2xl"></div>
    <div class="relative w-20 h-20 rounded-3xl border-2 border-dashed border-base-700 flex items-center justify-center bg-base-900/50">
      <svg class="w-9 h-9 text-base-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 12l2 2 4-4"/>
        <path d="M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9z"/>
      </svg>
    </div>
  </div>
  <p class="text-base text-base-200 font-semibold mb-1.5">No access tokens yet</p>
  <p class="text-xs text-base-500 font-mono mb-6 max-w-xs leading-relaxed">Generate access tokens to grant other users permission to use one bot per automate.</p>
  <button @click="openAddAccessModal()" type="button" class="group rounded-xl bg-gradient-to-br from-warn to-warn-dim text-base-950 font-bold text-xs px-5 py-3 flex items-center gap-2 transition-all active:scale-[.96] hover:shadow-lg hover:shadow-warn/30">
    <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span class="tracking-wider uppercase">Generate Token</span>
  </button>
</div>

<div x-show="accessList.length > 0" class="rounded-2xl border border-base-800/50 bg-base-900/45 overflow-hidden">
  <div class="hidden md:grid grid-cols-[1.5fr_1.2fr_1fr_1.8fr_auto] gap-3 px-4 py-2.5 border-b border-base-800/60 bg-base-900/60">
    <p class="text-[10px] text-base-500 uppercase tracking-widest font-mono font-bold">Bot</p>
    <p class="text-[10px] text-base-500 uppercase tracking-widest font-mono font-bold">Access ID</p>
    <p class="text-[10px] text-base-500 uppercase tracking-widest font-mono font-bold">Type</p>
    <p class="text-[10px] text-base-500 uppercase tracking-widest font-mono font-bold">Token</p>
    <p class="text-[10px] text-base-500 uppercase tracking-widest font-mono font-bold text-right">Actions</p>
  </div>

  <template x-for="(a, idx) in accessList" :key="a.id">
    <div class="grid grid-cols-1 md:grid-cols-[1.5fr_1.2fr_1fr_1.8fr_auto] gap-2 md:gap-3 px-4 py-3 border-b border-base-800/40 last:border-b-0 hover:bg-base-800/30 transition-colors items-center">
      <div class="flex items-center gap-2 min-w-0">
        <div class="w-8 h-8 rounded-lg bg-warn/10 border border-warn/20 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div class="min-w-0">
          <p class="text-sm font-semibold text-base-100 truncate leading-tight" x-text="a.botName || a.botId"></p>
          <p class="text-[10px] text-base-500 font-mono leading-tight mt-0.5" x-text="a.label ? ('label: ' + a.label) : '(no label)'"></p>
        </div>
      </div>

      <div class="hidden md:block min-w-0">
        <p class="text-xs font-mono text-base-300 truncate x-scroll whitespace-nowrap pb-0.5" x-text="a.accessId"></p>
      </div>

      <div>
        <span class="inline-flex items-center text-[9px] font-mono font-bold px-1.5 py-0.5 rounded-full border" :class="typeClass(a.botType)" x-text="a.botType"></span>
      </div>

      <div class="min-w-0 flex items-center gap-1">
        <code class="text-xs font-mono text-base-300 truncate x-scroll whitespace-nowrap pb-0.5 flex-1" x-text="a.showToken ? a.token : maskToken(a.token)"></code>
        <button @click="a.showToken=!a.showToken" type="button" class="text-base-500 hover:text-base-200 transition-colors p-0.5 flex-shrink-0">
          <svg x-show="!a.showToken" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg x-show="a.showToken" x-cloak class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>

      <div class="flex items-center gap-1 md:justify-end">
        <button @click="removeAccess(idx)" type="button" class="w-7 h-7 rounded-lg flex items-center justify-center text-base-500 hover:text-danger hover:bg-danger/10 transition-all active:scale-90" title="Revoke access">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </div>
  </template>
</div>
