<!-- /parts/edit-bot-modal.html -->
<div x-show="showEditBotModal" x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     @keydown.escape.window="closeEditBotModal()">
  <div class="absolute inset-0 bg-base-950/75 backdrop-blur-md" @click="closeEditBotModal()"></div>

  <div class="relative w-full max-w-md rounded-2xl border border-s2/25 bg-base-900/95 shadow-2xl shadow-black/50 overflow-hidden backdrop-blur-xl"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95 translate-y-3"
       x-transition:enter-end="opacity-100 scale-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 scale-100 translate-y-0"
       x-transition:leave-end="opacity-0 scale-95 translate-y-3">
    <div class="h-1 bg-gradient-to-r from-s2 via-s2-dim to-s1"></div>

    <div class="flex items-center justify-between px-5 py-4 border-b border-base-800/60">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-s2/15 to-s1/15 border border-s2/25 flex items-center justify-center">
          <svg class="w-4 h-4 text-s2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <div>
          <h3 class="text-sm font-bold text-base-100 tracking-tight">Edit Bot</h3>
          <p class="text-[10px] text-base-500 font-mono tracking-wider uppercase">Update bot settings</p>
        </div>
      </div>
      <button @click="closeEditBotModal()" type="button" class="w-8 h-8 rounded-lg flex items-center justify-center text-base-500 hover:text-danger hover:bg-danger/10 transition-all active:scale-90">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="px-5 py-5 space-y-4">
      <div>
        <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">
          <svg class="w-3 h-3 text-s1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Name
        </label>
        <input x-model="editBotName" @keydown.enter="saveEditBot()" placeholder="Bot name..." class="w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm px-3 py-2.5 font-mono placeholder:text-base-600 transition-all focus:bg-base-800 focus:border-s1/30" />
      </div>

      <div class="relative" x-data="{ open: false, opts: ['Dual','Shared','Business'] }" @click.outside="open=false">
        <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">
          <svg class="w-3 h-3 text-warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-4V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v3H4l2 13h12l2-13z"/><path d="M10 7V4h4v3"/></svg>
          Type
        </label>
        <button @click="open=!open" type="button" class="relative w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm pl-3 pr-8 py-2.5 font-mono text-base-100 transition-all cursor-pointer hover:border-warn/30 text-left">
          <span x-text="editBotType"></span>
          <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500 transition-transform pointer-events-none" :class="open?'rotate-180':''" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div x-show="open" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1" class="absolute z-40 mt-1 left-0 right-0 rounded-lg bg-base-800 border border-warn/20 shadow-lg shadow-black/40 overflow-hidden">
          <template x-for="o in opts" :key="'edittype-'+o">
            <button @click="editBotType=o; open=false" type="button" class="w-full px-3 py-2 text-left text-xs font-mono transition-colors flex items-center justify-between" :class="editBotType===o ? 'bg-warn/10 text-warn' : 'text-base-200 hover:bg-base-700/50'">
              <span x-text="o"></span>
              <span x-show="editBotType===o" class="w-1.5 h-1.5 rounded-full bg-warn"></span>
            </button>
          </template>
        </div>
      </div>

      <div x-show="editBotType === 'Business'" x-cloak x-transition.opacity.duration.200ms>
        <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">
          <svg class="w-3 h-3 text-s1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Rate per Day ($)
        </label>
        <input x-model.number="editBotRate" @keydown.enter="saveEditBot()" type="number" min="0" step="0.01" placeholder="e.g. 5.00" class="w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm px-3 py-2.5 font-mono placeholder:text-base-600 transition-all focus:bg-base-800 focus:border-s1/30" />
      </div>

      <div x-show="editBotType === 'Dual' || editBotType === 'Business'" x-cloak class="rounded-lg bg-base-800/40 border border-base-700/30 px-3 py-2 text-[10px] text-base-400 font-mono leading-relaxed flex items-start gap-2">
        <svg class="w-3.5 h-3.5 flex-shrink-0 mt-0.5 text-warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/></svg>
        <span>This type allows a maximum of <span class="text-warn font-bold">2 accounts</span> per bot.</span>
      </div>

      <div x-show="editBotError" x-transition.opacity.duration.200ms class="rounded-lg bg-danger/10 border border-danger/20 px-3 py-2 text-[11px] text-danger font-mono leading-snug flex items-center gap-2">
        <svg class="w-3.5 h-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span x-text="editBotError"></span>
      </div>
    </div>

    <div class="px-5 py-4 border-t border-base-800/60 flex gap-2 justify-end">
      <button @click="closeEditBotModal()" type="button" class="rounded-lg font-semibold text-xs px-4 py-2.5 border border-base-700/70 bg-base-800/50 text-base-200 hover:bg-base-700/40 transition-all active:scale-[.97]">
        Cancel
      </button>
      <button @click="saveEditBot()" :disabled="savingBot||(editBotType==='Business'&&!editBotRate)" type="button" class="rounded-lg font-semibold text-xs px-5 py-2.5 flex items-center gap-1.5 transition-all active:scale-[.97] min-w-[120px] justify-center" :class="savingBot||(editBotType==='Business'&&!editBotRate) ? 'bg-base-700/50 text-base-500 cursor-not-allowed' : 'bg-gradient-to-br from-s2 to-s2-dim text-base-950 hover:shadow-md hover:shadow-s2/30'">
        <template x-if="!savingBot">
          <div class="flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span>Save</span>
          </div>
        </template>
        <template x-if="savingBot">
          <div class="flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            <span>Saving...</span>
          </div>
        </template>
      </button>
    </div>
  </div>
</div>
