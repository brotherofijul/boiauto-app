<!-- /parts/add-access-modal.html -->
<div x-show="showAddAccessModal" x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     @keydown.escape.window="closeAddAccessModal()">
  <div class="absolute inset-0 bg-base-950/75 backdrop-blur-md" @click="closeAddAccessModal()"></div>

  <div class="relative w-full max-w-md rounded-2xl border border-warn/25 bg-base-900/95 shadow-2xl shadow-black/50 overflow-hidden backdrop-blur-xl max-h-[90vh] flex flex-col"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95 translate-y-3"
       x-transition:enter-end="opacity-100 scale-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 scale-100 translate-y-0"
       x-transition:leave-end="opacity-0 scale-95 translate-y-3">
    <div class="h-1 bg-gradient-to-r from-warn via-warn-dim to-s1"></div>

    <div class="flex items-center justify-between px-5 py-4 border-b border-base-800/60 flex-shrink-0">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-warn/15 to-s1/15 border border-warn/25 flex items-center justify-center">
          <svg class="w-4 h-4 text-warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div>
          <h3 class="text-sm font-bold text-base-100 tracking-tight">Generate Access Token</h3>
          <p class="text-[10px] text-base-500 font-mono tracking-wider uppercase">Grant bot access to another user</p>
        </div>
      </div>
      <button @click="closeAddAccessModal()" type="button" class="w-8 h-8 rounded-lg flex items-center justify-center text-base-500 hover:text-danger hover:bg-danger/10 transition-all active:scale-90">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="overflow-y-auto log-scroll px-5 py-5 space-y-4 flex-1">
      <div class="relative" x-data="{ open: false }" @click.outside="open=false">
        <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">
          <svg class="w-3 h-3 text-s2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
          Bot
          <span x-show="bots.length === 0" x-cloak class="text-warn ml-1 normal-case tracking-normal text-[9px]">(no bots available)</span>
        </label>
        <button @click="open=!open" :disabled="bots.length === 0" type="button"
          class="relative w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm pl-3 pr-8 py-2.5 font-mono text-base-100 transition-all cursor-pointer hover:border-s2/30 text-left disabled:cursor-not-allowed disabled:opacity-60">
          <span x-show="bots.length > 0" x-text="bots.find(b=>b.id===Number(newAccessBotId))?.name + ' · ' + (bots.find(b=>b.id===Number(newAccessBotId))?.botId || '') || 'Select bot...'"></span>
          <span x-show="bots.length === 0" x-cloak class="text-base-600">No bots available</span>
          <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500 transition-transform pointer-events-none" :class="open?'rotate-180':''" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div x-show="open" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1" class="absolute z-40 mt-1 left-0 right-0 rounded-lg bg-base-800 border border-s2/20 shadow-lg shadow-black/40 overflow-hidden max-h-60 overflow-y-auto log-scroll">
          <template x-for="b in bots" :key="'selacc-'+b.id">
            <button @click="newAccessBotId=b.id; open=false" type="button"
              class="w-full px-3 py-2 text-left text-xs font-mono transition-colors flex items-center justify-between gap-2"
              :class="Number(newAccessBotId)===b.id ? 'bg-s2/10 text-s2' : 'text-base-200 hover:bg-base-700/50'">
              <div class="min-w-0">
                <p class="truncate" x-text="b.name"></p>
                <p class="text-[9px] text-base-500 truncate" x-text="b.botId"></p>
              </div>
              <div class="flex items-center gap-1.5 flex-shrink-0">
                <span class="text-[9px] font-mono text-base-500" x-text="(b.type === 'Dual' || b.type === 'Business') ? (bots.filter(x => x.botId === b.botId).length + '/2') : '∞'"></span>
                <span class="text-[9px] px-1.5 py-0.5 rounded-full border" :class="typeClass(b.type)" x-text="b.type"></span>
              </div>
            </button>
          </template>
        </div>
      </div>

      <div>
        <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">
          <svg class="w-3 h-3 text-s1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Label <span class="text-base-600 normal-case tracking-normal text-[9px] ml-1">(optional, e.g. recipient name)</span>
        </label>
        <input x-model="newAccessLabel" @keydown.enter="confirmAddAccess()" placeholder="e.g. John, Client-A..." class="w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm px-3 py-2.5 font-mono placeholder:text-base-600 transition-all focus:bg-base-800 focus:border-s1/30" />
      </div>

      <button @click="confirmAddAccess()" :disabled="addingAccess || !newAccessBotId" type="button"
        class="w-full rounded-lg font-semibold text-xs py-2.5 flex items-center justify-center gap-2 transition-all active:scale-[.97]"
        :class="addingAccess || !newAccessBotId ? 'bg-base-700/50 text-base-500 cursor-not-allowed' : 'bg-gradient-to-br from-warn to-warn-dim text-base-950 hover:shadow-md hover:shadow-warn/30'">
        <template x-if="!addingAccess">
          <div class="flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            <span>Generate Token</span>
          </div>
        </template>
        <template x-if="addingAccess">
          <div class="flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            <span>Generating...</span>
          </div>
        </template>
      </button>

      <div x-show="generatedAccessToken" x-cloak x-transition.opacity.duration.200ms class="space-y-3">
        <div>
          <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">
            <svg class="w-3 h-3 text-s1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Access Token (Share with recipient)
          </label>
          <div class="flex items-stretch gap-2">
            <input :value="generatedAccessToken" readonly class="flex-1 rounded-lg bg-base-800/70 border border-warn/30 text-xs px-3 py-2.5 font-mono text-warn focus:outline-none" />
            <button @click="copyAccessToken()" type="button"
              class="px-3 rounded-lg border transition-all active:scale-90 flex items-center justify-center"
              :class="accessCopied ? 'border-s1/40 bg-s1/15 text-s1' : 'border-base-700/70 bg-base-800/50 text-base-300 hover:text-base-100'">
              <svg x-show="!accessCopied" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              <svg x-show="accessCopied" x-cloak class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
          </div>
        </div>

        <div class="rounded-lg bg-s1/5 border border-s1/20 px-3 py-2.5 flex items-center gap-2">
          <svg class="w-4 h-4 text-s1 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <p class="text-[10px] text-s1 font-mono leading-relaxed">Access token created. Recipient can use it to run 1 automate linked to this bot.</p>
        </div>
      </div>

      <div x-show="addAccessError" x-transition.opacity.duration.200ms class="rounded-lg bg-danger/10 border border-danger/20 px-3 py-2 text-[11px] text-danger font-mono leading-snug flex items-center gap-2">
        <svg class="w-3.5 h-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span x-text="addAccessError"></span>
      </div>
    </div>

    <div class="px-5 py-4 border-t border-base-800/60 flex gap-2 justify-end flex-shrink-0">
      <button @click="closeAddAccessModal()" type="button" class="rounded-lg font-semibold text-xs px-4 py-2.5 border border-base-700/70 bg-base-800/50 text-base-200 hover:bg-base-700/40 transition-all active:scale-[.97]">
        Close
      </button>
    </div>
  </div>
</div>
