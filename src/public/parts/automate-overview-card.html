<!-- /parts/automate-overview-card.html -->
<div x-show="loadingAutomates && automates.length === 0" class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <template x-for="i in 4" :key="'skel-'+i">
    <div class="rounded-2xl border border-base-800/50 bg-base-900/45 overflow-hidden">
      <div class="h-1 flex-shrink-0 bg-base-700/40"></div>
      <div class="p-4 space-y-3 animate-pulse">
        <div class="flex items-center gap-2.5">
          <div class="w-9 h-9 rounded-xl bg-base-800"></div>
          <div class="flex-1 space-y-1.5">
            <div class="h-3.5 bg-base-800 rounded w-2/3"></div>
            <div class="h-2.5 bg-base-800/70 rounded w-1/3"></div>
          </div>
        </div>
        <div class="space-y-1.5">
          <div class="h-7 bg-base-800/70 rounded-lg"></div>
          <div class="h-7 bg-base-800/70 rounded-lg"></div>
          <div class="h-7 bg-base-800/70 rounded-lg"></div>
        </div>
      </div>
    </div>
  </template>
</div>

<div x-show="!loadingAutomates && filteredAutomates.length === 0 && searchAutomates.trim()" x-cloak class="flex flex-col items-center justify-center py-16 text-center">
  <div class="w-12 h-12 rounded-xl border border-base-700/40 flex items-center justify-center mb-3">
    <svg class="w-5 h-5 text-base-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </div>
  <p class="text-xs text-base-400 font-mono">No automates match "<span x-text="searchAutomates"></span>"</p>
</div>

<div x-show="!loadingAutomates && filteredAutomates.length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <template x-for="(acc, idx) in filteredAutomates" :key="acc.id">
    <div class="rounded-2xl border overflow-hidden transition-all duration-300 relative backdrop-blur-sm hover:border-base-700/70"
      :class="(acc.skillUpRunning || acc.autoWarRunning || acc.autoWorkRunning)
         ? 'border-s1/30 glow-s1 bg-base-900/80'
         : 'border-base-800/50 bg-base-900/45'">
      <div class="h-1 flex-shrink-0 transition-colors"
        :class="(acc.skillUpRunning || acc.autoWarRunning || acc.autoWorkRunning) ? 'bg-s1/60' : 'bg-base-700/40'"></div>

      <button @click="openDetail(acc.id)" type="button" class="w-full text-left p-4 pb-3 flex items-center justify-between gap-2 hover:bg-base-800/30 transition-colors">
        <div class="flex items-center gap-2.5 min-w-0">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 font-mono font-bold text-xs"
            :class="'bg-s1/10 text-s1 border border-s1/20'"
            x-text="(idx + 1).toString().padStart(2, '0')"></div>
          <div class="min-w-0">
            <p class="text-sm font-semibold text-base-100 truncate leading-tight" x-text="acc.name || 'Unnamed'"></p>
            <div class="flex items-center gap-1.5 mt-0.5">
              <p class="text-[10px] text-base-500 font-mono leading-tight" x-text="'AUTOMATE ' + (idx + 1)"></p>
              <div class="flex items-center gap-1 ml-1">
                <span class="w-1.5 h-1.5 rounded-full transition-all" :class="acc.skillUpRunning ? 'bg-s1 shadow-[0_0_4px_rgba(0,232,143,0.6)]' : 'bg-base-700/50'" title="Skill"></span>
                <span class="w-1.5 h-1.5 rounded-full transition-all" :class="acc.autoWarRunning ? 'bg-s1 shadow-[0_0_4px_rgba(245,166,35,0.6)]' : 'bg-base-700/50'" title="Training"></span>
                <span class="w-1.5 h-1.5 rounded-full transition-all" :class="acc.autoWorkRunning ? 'bg-s1 shadow-[0_0_4px_rgba(0,200,255,0.6)]' : 'bg-base-700/50'" title="Work"></span>
              </div>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-1.5 flex-shrink-0">
          <span class="flex items-center gap-1 text-[10px] font-mono px-2 py-0.5 rounded-full border transition-colors"
            :class="acc.botStatus === 'connected' ? 'text-s1 bg-s1/10 border-s1/30' : (acc.botStatus === 'connecting' ? 'text-s1 bg-s1/10 border-s1/30' : 'text-danger bg-danger/10 border-danger/30')">
            <span class="relative flex w-1.5 h-1.5">
              <template x-if="acc.botStatus === 'connected'">
                <span class="absolute inline-flex w-full h-full rounded-full bg-s1 opacity-75 animate-ping"></span>
              </template>
              <template x-if="acc.botStatus === 'connecting'">
                <svg class="w-2.5 h-2.5 animate-spin text-s1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
              </template>
              <span class="relative inline-flex w-1.5 h-1.5 rounded-full" :class="acc.botStatus === 'connected' ? 'bg-s1' : (acc.botStatus === 'connecting' ? 'bg-s1' : 'bg-danger')"></span>
            </span>
            <span x-text="acc.botStatus === 'connected' ? 'Connected' : (acc.botStatus === 'connecting' ? 'Connecting' : 'Disconnected')"></span>
          </span>
          <svg class="w-3.5 h-3.5 text-base-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </button>

      <div class="px-4 pb-4"
        x-init="fetch('parts/feature-toggle.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>

      <div x-show="acc.error" x-transition.opacity.duration.200ms class="mx-4 mb-4 rounded-lg bg-danger/10 border border-danger/20 px-3 py-2 text-[11px] text-danger font-mono leading-snug flex items-center gap-2">
        <svg class="w-3.5 h-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span x-text="acc.error"></span>
      </div>
    </div>
  </template>
</div>
