<!-- /parts/empty-state.html -->
<div x-show="accounts.length === 0" x-cloak x-transition.opacity.duration.300ms class="flex flex-col items-center justify-center py-24 text-center">
  <div class="relative mb-6">
    <div class="absolute inset-0 rounded-3xl bg-s1/10 blur-2xl"></div>
    <div class="relative w-20 h-20 rounded-3xl border-2 border-dashed border-base-700 flex items-center justify-center bg-base-900/50">
      <svg class="w-9 h-9 text-base-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    </div>
  </div>
  <p class="text-base text-base-200 font-semibold mb-1.5">No accounts yet</p>
  <p class="text-xs text-base-500 font-mono mb-6 max-w-xs leading-relaxed">Add your first BOI account to start managing skill upgrades and automation.</p>
  <button @click="openAddModal()" type="button" class="group rounded-xl bg-gradient-to-br from-s1 to-s1-dim text-base-950 font-bold text-xs px-5 py-3 flex items-center gap-2 transition-all active:scale-[.96] hover:shadow-lg hover:shadow-s1/30">
    <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span class="tracking-wider uppercase">Add Account</span>
  </button>
</div>
