<!-- /parts/upgrade-skill.html -->
<main class="flex-1 max-w-3xl mx-auto w-full px-4 sm:px-6 py-5 sm:py-7">
  <template x-if="currentView === 'dashboard'">
    <div x-init="fetch('parts/dashboard-view.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
  </template>

  <template x-if="currentView === 'access'">
    <div x-init="fetch('parts/access-view.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
  </template>

  <template x-if="currentView === 'automate'">
    <div>
      <div x-init="fetch('parts/topbar.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
      <div x-init="fetch('parts/empty-state.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
      <div x-init="fetch('parts/automate-overview-card.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
    </div>
  </template>

  <template x-if="currentView === 'bot'">
    <div x-init="fetch('parts/bot-view.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
  </template>

  <template x-if="currentView === 'guide'">
    <div x-init="fetch('parts/guide-view.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
  </template>

  <div x-init="fetch('parts/automate-detail-modal.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
  <div x-init="fetch('parts/add-automate-modal.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
  <div x-init="fetch('parts/add-bot-modal.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
  <div x-init="fetch('parts/edit-bot-modal.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
  <div x-init="fetch('parts/add-access-modal.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
  <div x-init="fetch('parts/navbar.html').then(r=>r.text()).then(h=>{$el.innerHTML=h; Alpine.initTree($el)})"></div>
</main>
