<!-- /parts/account-detail-modal.html -->
<div x-show="selectedAccountId" x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     @keydown.escape.window="closeDetail()">
  
  <div class="absolute inset-0 bg-base-950/75 backdrop-blur-md" @click="closeDetail()"></div>

  <div class="relative w-full max-w-lg rounded-2xl border bg-base-900/95 shadow-2xl shadow-black/50 overflow-hidden backdrop-blur-xl max-h-[90vh] flex flex-col"
       :class="selectedIndex >= 0 && selectedIndex % 2 === 0 ? 'border-s1/25' : 'border-s2/25'"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95 translate-y-3"
       x-transition:enter-end="opacity-100 scale-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 scale-100 translate-y-0"
       x-transition:leave-end="opacity-0 scale-95 translate-y-3">

    <template x-if="selectedAccount">
      <div class="flex flex-col max-h-[90vh]">
        
        <div class="h-1 flex-shrink-0"
          :class="selectedIndex % 2 === 0 ? 'bg-gradient-to-r from-s1 via-s1-dim to-s2' : 'bg-gradient-to-r from-s2 via-s2-dim to-s1'"></div>

        <div class="flex items-center justify-between px-5 py-4 border-b border-base-800/60 flex-shrink-0">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 font-mono font-bold text-sm"
              :class="selectedIndex % 2 === 0 ? 'bg-s1/10 text-s1 border border-s1/25' : 'bg-s2/10 text-s2 border border-s2/25'"
              x-text="(selectedIndex + 1).toString().padStart(2, '0')"></div>
            <div class="min-w-0">
              <h3 class="text-base font-bold text-base-100 tracking-tight truncate" x-text="selectedAccount.name || 'Unnamed Automate'"></h3>
              <div class="flex items-center gap-1.5 mt-0.5">
                <span class="relative flex w-1.5 h-1.5">
                  <template x-if="selectedAccount.running">
                    <span class="absolute inline-flex w-full h-full rounded-full bg-s1 opacity-75 animate-ping"></span>
                  </template>
                  <span class="relative inline-flex w-1.5 h-1.5 rounded-full"
                    :class="selectedAccount.running ? 'bg-s1' : 'bg-base-500'"></span>
                </span>
                <p class="text-[10px] text-base-500 font-mono tracking-wider uppercase"
                  x-text="selectedAccount.running ? 'Running' : 'Idle'"></p>
              </div>
            </div>
          </div>
          <button @click="closeDetail()" type="button" class="w-8 h-8 rounded-lg flex items-center justify-center text-base-500 hover:text-danger hover:bg-danger/10 transition-all active:scale-90 flex-shrink-0">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="overflow-y-auto log-scroll px-5 py-5 space-y-4 flex-1">

          <div class="grid grid-cols-2 gap-2.5">
            
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Balance</p>
              <p class="text-xl font-bold font-mono text-base-100 leading-none flex items-center gap-1.5">
                <svg class="w-4 h-4 text-s1 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <span class="x-scroll whitespace-nowrap pb-0.5" x-text="formatBalance(selectedAccount.balance)"></span>
              </p>
            </div>
            
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Diamond</p>
              <p class="text-xl font-bold font-mono text-s2 leading-none flex items-center gap-1.5">
                <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 18 3 22 9 12 22 2 9 6 3"/></svg>
                <span class="x-scroll whitespace-nowrap pb-0.5" x-text="formatNumber(selectedAccount.diamond)"></span>
              </p>
            </div>
            
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Bot ID</p>
              <p class="text-sm font-bold font-mono text-base-200 leading-none flex items-center gap-1.5 min-w-0">
                <svg class="w-4 h-4 text-base-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
                <span class="x-scroll whitespace-nowrap pb-0.5 min-w-0" x-text="selectedAccount.botId || '—'"></span>
              </p>
            </div>
            
            <div class="rounded-xl bg-base-800/50 border border-base-700/40 p-3">
              <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono mb-1.5">Bot Status</p>
              <p class="leading-none flex items-center gap-2">
                <span class="relative flex w-3 h-3">
                  <template x-if="selectedAccount.botStatus === 'online'">
                    <span class="absolute inline-flex w-full h-full rounded-full bg-s1 opacity-75 animate-ping"></span>
                  </template>
                  <span class="relative inline-flex w-3 h-3 rounded-full"
                    :class="selectedAccount.botStatus === 'online' ? 'bg-s1' : selectedAccount.botStatus === 'error' ? 'bg-danger' : 'bg-base-500'"></span>
                </span>
                <span class="text-sm font-mono font-bold"
                  :class="selectedAccount.botStatus === 'online' ? 'text-s1' : selectedAccount.botStatus === 'error' ? 'text-danger' : 'text-base-400'"
                  x-text="botStatusText(selectedAccount.botStatus)"></span>
              </p>
            </div>
          </div>

          <div class="border-t border-base-800/60 pt-4 space-y-3.5">
            <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono font-bold">Configuration</p>

            <div>
              <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">
                <svg class="w-3 h-3 text-s1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Bearer Token
              </label>
              <div class="relative">
                <input x-model="selectedAccount.bearer" @input="saveAccount(selectedIndex)" :type="selectedAccount.showBearer?'text':'password'" :disabled="selectedAccount.running" placeholder="Bearer token..." class="w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm px-3 py-2.5 pr-10 font-mono placeholder:text-base-600 transition-all focus:bg-base-800" />
                <button @click="selectedAccount.showBearer=!selectedAccount.showBearer" type="button" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-base-500 hover:text-base-200 transition-colors p-0.5">
                  <svg x-show="!selectedAccount.showBearer" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></svg>
                  <svg x-show="selectedAccount.showBearer" x-cloak class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" /><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" /><line x1="1" y1="1" x2="23" y2="23" /></svg>
                </button>
              </div>
            </div>

            <div class="relative" x-data="{ open: false }" @click.outside="open=false">
              <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider flex items-center gap-1.5">
                <svg class="w-3 h-3 text-warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Access
                <span class="ml-auto text-[9px] font-mono normal-case tracking-normal flex items-center gap-1" :class="selectedAccount.accessType === 'Shared' ? 'text-s2' : 'text-base-500'">
                  <span x-show="selectedAccount.accessType" x-text="selectedAccount.accessType === 'Shared' ? (accessList.find(a=>a.accessId===selectedAccount.accessId)?.usageCount || 0) + ' using' : (accessList.find(a=>a.accessId===selectedAccount.accessId)?.usageCount || 0) + '/1'"></span>
                  <span x-show="selectedAccount.accessType" class="px-1.5 py-0.5 rounded-full border" :class="typeClass(selectedAccount.accessType)" x-text="selectedAccount.accessType"></span>
                </span>
              </label>
              <button @click="open=!open" :disabled="selectedAccount.running || accessList.length === 0" type="button" class="relative w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm pl-3 pr-8 py-2.5 font-mono text-base-100 transition-all cursor-pointer hover:border-warn/30 text-left disabled:cursor-not-allowed disabled:opacity-60">
                <span x-text="accessList.find(a=>a.accessId===selectedAccount.accessId)?.name || accessList.find(a=>a.accessId===selectedAccount.accessId)?.accessId || 'Select access...'"></span>
                <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500 transition-transform pointer-events-none" :class="open?'rotate-180':''" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div x-show="open" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1" class="absolute z-40 mt-1 left-0 right-0 rounded-lg bg-base-800 border border-warn/20 shadow-lg shadow-black/40 overflow-hidden max-h-60 overflow-y-auto log-scroll">
                <template x-for="a in accessList" :key="'detacc-'+a.accessId">
                  <button @click="selectedAccount.accessId=a.accessId; selectedAccount.accessName=a.name; selectedAccount.accessType=a.type; selectedAccount.botId=a.botId; selectedAccount.botName=a.botName; selectedAccount.type=a.type; open=false; saveAccount(selectedIndex)" type="button" class="w-full px-3 py-2 text-left text-xs font-mono transition-colors flex items-center justify-between gap-2" :class="selectedAccount.accessId===a.accessId ? 'bg-warn/10 text-warn' : 'text-base-200 hover:bg-base-700/50'">
                    <div class="min-w-0">
                      <p class="truncate" x-text="a.name || a.accessId"></p>
                      <p class="text-[9px] text-base-500 truncate" x-text="a.botName + ' · ' + a.accessId"></p>
                    </div>
                    <div class="flex items-center gap-1.5 flex-shrink-0">
                      <span class="text-[9px] font-mono" :class="isAccessFull(a) ? 'text-danger' : 'text-s1'" x-text="accessUsageText(a)"></span>
                      <span class="text-[9px] px-1.5 py-0.5 rounded-full border" :class="typeClass(a.type)" x-text="a.type"></span>
                    </div>
                  </button>
                </template>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
              
              <div class="relative" x-data="{ open: false, opts: [{v:1,l:'Barrack'},{v:2,l:'War Tech'},{v:3,l:'Scientist'}] }" @click.outside="open=false">
                <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider">Skill</label>
                <button @click="open=!open" :disabled="selectedAccount.running" type="button" class="relative w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm pl-3 pr-8 py-2.5 font-mono text-base-100 transition-all cursor-pointer hover:border-s1/30 text-left disabled:cursor-not-allowed">
                  <span x-text="opts.find(o=>o.v===selectedAccount.skill)?.l"></span>
                  <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500 transition-transform pointer-events-none" :class="open?'rotate-180':''" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div x-show="open" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1" class="absolute z-40 mt-1 left-0 right-0 rounded-lg bg-base-800 border border-s1/20 shadow-lg shadow-black/40 overflow-hidden">
                  <template x-for="o in opts" :key="selectedAccount.id+'sk-'+o.v">
                    <button @click="selectedAccount.skill=o.v; open=false; saveAccount(selectedIndex)" type="button" class="w-full px-3 py-2 text-left text-xs font-mono transition-colors flex items-center justify-between" :class="selectedAccount.skill===o.v ? 'bg-s1/10 text-s1' : 'text-base-200 hover:bg-base-700/50'">
                      <span x-text="o.l"></span>
                      <span x-show="selectedAccount.skill===o.v" class="w-1.5 h-1.5 rounded-full bg-s1"></span>
                    </button>
                  </template>
                </div>
              </div>
              
              <div class="relative" x-data="{ open: false, opts: [{v:1,l:'Money'},{v:2,l:'Diamond'}] }" @click.outside="open=false">
                <label class="block text-[10px] text-base-500 mb-1.5 font-mono uppercase tracking-wider">Pay</label>
                <button @click="open=!open" :disabled="selectedAccount.running" type="button" class="relative w-full rounded-lg bg-base-800/70 border border-base-700/70 text-sm pl-3 pr-8 py-2.5 font-mono text-base-100 transition-all cursor-pointer hover:border-s1/30 text-left disabled:cursor-not-allowed">
                  <span x-text="opts.find(o=>o.v===selectedAccount.pay)?.l"></span>
                  <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-base-500 transition-transform pointer-events-none" :class="open?'rotate-180':''" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div x-show="open" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1" class="absolute z-40 mt-1 left-0 right-0 rounded-lg bg-base-800 border border-s1/20 shadow-lg shadow-black/40 overflow-hidden">
                  <template x-for="o in opts" :key="selectedAccount.id+'pay-'+o.v">
                    <button @click="selectedAccount.pay=o.v; open=false; saveAccount(selectedIndex)" type="button" class="w-full px-3 py-2 text-left text-xs font-mono transition-colors flex items-center justify-between" :class="selectedAccount.pay===o.v ? 'bg-s1/10 text-s1' : 'text-base-200 hover:bg-base-700/50'">
                      <span x-text="o.l"></span>
                      <span x-show="selectedAccount.pay===o.v" class="w-1.5 h-1.5 rounded-full bg-s1"></span>
                    </button>
                  </template>
                </div>
              </div>
            </div>
          </div>

          <div class="border-t border-base-800/60 pt-4 space-y-2">
            <p class="text-[10px] text-base-500 uppercase tracking-wider font-mono font-bold">Progress</p>
            <div class="grid grid-cols-2 gap-2">
              <div class="rounded-lg bg-base-800/50 border border-base-700/30 p-2.5 text-center">
                <p class="text-[9px] text-base-500 uppercase tracking-widest mb-1 font-mono">Current</p>
                <p class="text-2xl font-bold font-mono text-base-100 leading-none" x-text="selectedAccount.currentLevel??'—'">—</p>
              </div>
              <div class="rounded-lg bg-base-800/50 border border-base-700/30 p-2.5 text-center">
                <p class="text-[9px] text-base-500 uppercase tracking-widest mb-1 font-mono">Next</p>
                <p class="text-2xl font-bold font-mono leading-none"
                  :class="selectedIndex % 2 === 0 ? 'text-s1' : 'text-s2'"
                  x-text="selectedAccount.targetLevel??'—'">—</p>
              </div>
            </div>
            <div class="rounded-lg bg-base-800/50 border border-base-700/30 px-3 py-2 text-center">
              <p class="text-[9px] text-base-500 uppercase tracking-widest mb-0.5 font-mono">Time Remaining</p>
              <p class="text-lg font-bold font-mono leading-none"
                :class="timeClass(selectedIndex)"
                :style="timeLow(selectedIndex)?'animation:count-pulse 1s ease-in-out infinite':''"
                x-text="selectedAccount.time">—</p>
            </div>
          </div>

          <div x-show="selectedAccount.error" x-transition.opacity.duration.200ms class="rounded-lg bg-danger/10 border border-danger/20 px-3 py-2 text-[11px] text-danger font-mono leading-snug flex items-center gap-2">
            <svg class="w-3.5 h-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span x-text="selectedAccount.error"></span>
          </div>
        </div>

        <div class="px-5 py-4 border-t border-base-800/60 flex gap-2 flex-shrink-0">
          <button @click="removeAccount(selectedIndex)" type="button" class="rounded-lg font-semibold text-xs px-4 py-2.5 border border-danger/30 bg-danger/5 text-danger hover:bg-danger/10 transition-all active:scale-[.97] flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            Remove
          </button>
          <div class="flex-1"></div>
          <button @click="stopAccount(selectedIndex)" :disabled="!selectedAccount.running" type="button" class="rounded-lg font-semibold text-xs px-4 py-2.5 border transition-all active:scale-[.97]" :class="!selectedAccount.running ? 'border-base-700/50 bg-base-800/50 text-base-600 cursor-not-allowed' : 'border-danger/40 bg-danger/10 text-danger hover:bg-danger/15'">
            Stop
          </button>
          <button @click="startAccount(selectedIndex)" :disabled="selectedAccount.running||!selectedAccount.bearer.trim()||!selectedAccount.accessId" type="button" class="rounded-lg font-semibold text-xs px-5 py-2.5 flex items-center gap-1.5 transition-all active:scale-[.97]" :class="selectedAccount.running||!selectedAccount.bearer.trim()||!selectedAccount.accessId ? 'bg-base-700/50 text-base-500 cursor-not-allowed' : 'bg-gradient-to-br from-s1 to-s1-dim text-base-950 hover:shadow-md hover:shadow-s1/30'">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21" /></svg>
            Start
          </button>
        </div>
      </div>
    </template>
  </div>
</div>
